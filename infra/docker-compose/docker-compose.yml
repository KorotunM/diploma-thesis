services:
  postgres:
    image: pgvector/pgvector:pg16
    env_file:
      - ../env/local/app.env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    env_file:
      - ../env/local/app.env
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  minio:
    image: minio/minio:latest
    env_file:
      - ../env/local/app.env
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    volumes:
      - minio_data:/data

  minio-bootstrap:
    image: minio/mc:latest
    env_file:
      - ../env/local/app.env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/bootstrap.sh"]
    volumes:
      - ../minio/bootstrap.sh:/bootstrap.sh:ro

  migrate:
    build:
      context: ../..
      dockerfile: apps/scheduler/Dockerfile
    env_file:
      - ../env/local/app.env
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"

  scheduler:
    build:
      context: ../..
      dockerfile: apps/scheduler/Dockerfile
    env_file:
      - ../env/local/app.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/healthz', timeout=5)"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  scheduler-worker:
    build:
      context: ../..
      dockerfile: apps/scheduler/Dockerfile
    env_file:
      - ../env/local/app.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    command: python -m apps.scheduler.app.worker

  auto-seed:
    build:
      context: ../..
      dockerfile: apps/scheduler/Dockerfile
    env_file:
      - ../env/local/app.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      scheduler:
        condition: service_healthy
    command: python -m scripts.seed_demo_data
    restart: "no"

  parser:
    build:
      context: ../..
      dockerfile: apps/parser/Dockerfile
    env_file:
      - ../env/local/app.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    ports:
      - "8002:8002"

  parser-worker:
    build:
      context: ../..
      dockerfile: apps/parser/Dockerfile
    env_file:
      - ../env/local/app.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    command: python -m apps.parser.app.worker

  normalizer:
    build:
      context: ../..
      dockerfile: apps/normalizer/Dockerfile
    env_file:
      - ../env/local/app.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    ports:
      - "8003:8003"

  normalizer-worker:
    build:
      context: ../..
      dockerfile: apps/normalizer/Dockerfile
    env_file:
      - ../env/local/app.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    command: python -m apps.normalizer.app.worker

  backend:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    env_file:
      - ../env/local/app.env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8004:8004"

  frontend:
    build:
      context: ../..
      dockerfile: apps/frontend/Dockerfile
    depends_on:
      - backend
      - scheduler
      - parser
      - normalizer
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 5s

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/rules:/etc/prometheus/rules:ro

  grafana:
    image: grafana/grafana:latest
    env_file:
      - ../env/local/app.env
    environment:
      GF_LOG_LEVEL: warn
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ../grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:
  grafana_data:
