global:
  scrape_interval: 15s

scrape_configs:
  - job_name: scheduler
    static_configs:
      - targets: ["scheduler:8001"]
    metrics_path: /metrics
  - job_name: parser
    static_configs:
      - targets: ["parser:8002"]
    metrics_path: /metrics
  - job_name: normalizer
    static_configs:
      - targets: ["normalizer:8003"]
    metrics_path: /metrics
  - job_name: backend
    static_configs:
      - targets: ["backend:8004"]
    metrics_path: /metrics
