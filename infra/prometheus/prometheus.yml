global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: scheduler
    static_configs:
      - targets: ["scheduler:8001"]
        labels:
          service: scheduler
          layer: control
    metrics_path: /metrics
  - job_name: parser
    static_configs:
      - targets: ["parser:8002"]
        labels:
          service: parser
          layer: ingestion
    metrics_path: /metrics
  - job_name: normalizer
    static_configs:
      - targets: ["normalizer:8003"]
        labels:
          service: normalizer
          layer: resolution
    metrics_path: /metrics
  - job_name: backend
    static_configs:
      - targets: ["backend:8004"]
        labels:
          service: backend
          layer: delivery
    metrics_path: /metrics
