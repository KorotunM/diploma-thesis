openapi: 3.1.0
info:
  title: Scheduler Admin API
  version: 0.1.0
paths:
  /healthz:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: Service is alive
  /admin/v1/crawl-jobs:
    post:
      summary: Create a manual crawl run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualCrawlTriggerRequest"
      responses:
        "202":
          description: Crawl run persisted and crawl request published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrawlJobAcceptedResponse"
        "404":
          description: Source endpoint was not found
        "502":
          description: Crawl request could not be published to RabbitMQ
  /admin/v1/freshness:
    get:
      summary: Compute source freshness from observed crawl activity
      parameters:
        - in: query
          name: include_inactive
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Freshness overview computed from sources endpoints runs and raw artifacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreshnessOverviewResponse"
  /admin/v1/freshness/monitor-jobs:
    post:
      summary: Run stale-source monitoring and emit review.required for stale scheduled sources
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaleSourceMonitoringRunRequest"
      responses:
        "202":
          description: Stale-source monitoring completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaleSourceMonitoringRunResponse"
  /admin/v1/discovery/materialize-jobs:
    post:
      summary: Fetch discovery sources and materialize child crawl endpoints
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscoveryMaterializationRequest"
      responses:
        "202":
          description: Discovery materialization completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryMaterializationResponse"
        "400":
          description: Discovery workflow could not be executed because source metadata or endpoint topology is invalid
        "404":
          description: Source was not found
components:
  schemas:
    ManualCrawlTriggerRequest:
      type: object
      required:
        - source_key
        - endpoint_id
      properties:
        crawl_run_id:
          type: string
          format: uuid
        source_key:
          type: string
        endpoint_id:
          type: string
          format: uuid
        priority:
          type: string
          enum: [high, bulk]
          default: bulk
        requested_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
          default: {}
    PipelineRun:
      type: object
      required:
        - run_id
        - run_type
        - status
        - trigger_type
        - started_at
        - metadata
      properties:
        run_id:
          type: string
          format: uuid
        run_type:
          type: string
          enum: [crawl, replay, backfill]
        status:
          type: string
          enum: [queued, published, running, succeeded, failed, canceled]
        trigger_type:
          type: string
          enum: [manual, schedule, replay]
        source_key:
          type: string
          nullable: true
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
          additionalProperties: true
    CrawlJobAcceptedResponse:
      type: object
      required:
        - pipeline_run
        - event
      properties:
        pipeline_run:
          $ref: "#/components/schemas/PipelineRun"
        event:
          type: object
          additionalProperties: true
    FreshnessState:
      type: string
      enum: [fresh, aging, stale, scheduled, manual, unknown, inactive]
    SourceFreshnessSnapshot:
      type: object
      required:
        - source_id
        - source_key
        - source_type
        - trust_tier
        - is_active
        - endpoint_count
        - scheduled_endpoint_count
        - endpoint_urls
        - metadata
        - freshness_state
        - freshness_reason
        - checked_at
      properties:
        source_id:
          type: string
          format: uuid
        source_key:
          type: string
        source_type:
          type: string
        trust_tier:
          type: string
        is_active:
          type: boolean
        endpoint_count:
          type: integer
        scheduled_endpoint_count:
          type: integer
        refresh_interval_seconds:
          type: integer
          nullable: true
        endpoint_urls:
          type: array
          items:
            type: string
        last_observed_at:
          type: string
          format: date-time
          nullable: true
        last_attempted_at:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        freshness_state:
          $ref: "#/components/schemas/FreshnessState"
        freshness_reason:
          type: string
        stale_since:
          type: string
          format: date-time
          nullable: true
        checked_at:
          type: string
          format: date-time
    FreshnessOverviewResponse:
      type: object
      required:
        - checked_at
        - total_sources
        - active_sources
        - scheduled_sources
        - fresh_sources
        - aging_sources
        - stale_sources
        - policy_only_sources
        - inactive_sources
        - sources
      properties:
        checked_at:
          type: string
          format: date-time
        total_sources:
          type: integer
        active_sources:
          type: integer
        scheduled_sources:
          type: integer
        fresh_sources:
          type: integer
        aging_sources:
          type: integer
        stale_sources:
          type: integer
        policy_only_sources:
          type: integer
        inactive_sources:
          type: integer
        sources:
          type: array
          items:
            $ref: "#/components/schemas/SourceFreshnessSnapshot"
    StaleSourceMonitoringRunRequest:
      type: object
      properties:
        monitor_run_id:
          type: string
          format: uuid
        dry_run:
          type: boolean
          default: false
        include_inactive:
          type: boolean
          default: true
        emit_review_required:
          type: boolean
          default: true
    StaleSourceMonitoringJobResult:
      type: object
      required:
        - source_key
        - freshness_state
        - emitted_review_required
        - metadata_updated
      properties:
        source_key:
          type: string
        freshness_state:
          $ref: "#/components/schemas/FreshnessState"
        emitted_review_required:
          type: boolean
        metadata_updated:
          type: boolean
        stale_since:
          type: string
          format: date-time
          nullable: true
    StaleSourceMonitoringRunResponse:
      type: object
      required:
        - monitor_run_id
        - checked_at
        - total_sources
        - stale_sources
        - emitted_review_required_count
        - metadata_updated_count
        - items
      properties:
        monitor_run_id:
          type: string
          format: uuid
        checked_at:
          type: string
          format: date-time
        total_sources:
          type: integer
        stale_sources:
          type: integer
        emitted_review_required_count:
          type: integer
        metadata_updated_count:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/StaleSourceMonitoringJobResult"
    DiscoveryMaterializationRequest:
      type: object
      properties:
        discovery_run_id:
          type: string
          format: uuid
        source_key:
          type: string
          default: tabiturient-aggregator
        dry_run:
          type: boolean
          default: false
        limit:
          type: integer
          minimum: 1
          maximum: 5000
          nullable: true
    DiscoveryMaterializationResultItem:
      type: object
      required:
        - endpoint_url
        - parser_profile
        - action
      properties:
        endpoint_url:
          type: string
        parser_profile:
          type: string
        action:
          type: string
          enum: [created, updated, existing, dry_run]
    DiscoveryMaterializationResponse:
      type: object
      required:
        - discovery_run_id
        - source_key
        - parent_endpoint_url
        - fetched_at
        - dry_run
        - discovered_total
        - materialized_count
        - existing_count
        - items
      properties:
        discovery_run_id:
          type: string
          format: uuid
        source_key:
          type: string
        parent_endpoint_url:
          type: string
        fetched_at:
          type: string
          format: date-time
        dry_run:
          type: boolean
        discovered_total:
          type: integer
        materialized_count:
          type: integer
        existing_count:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/DiscoveryMaterializationResultItem"
